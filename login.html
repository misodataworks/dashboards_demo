<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Miso Dataworks Executive Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(
                135deg, 
                #020818 0%,    
                #001035 30%,   
                #104080 55%,   
                #fcd385 75%,   
                #fb923c 100%    
            );
            background-size: 300% 300%;
            animation: gradientBG 25s ease-in-out infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            padding: 50px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.5); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 440px;
            text-align: center;
        }

        .logo-container {
            width: 130px; /* Aumentado para que el logo luzca más */
            height: 130px;
            margin: 0 auto 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff; 
            border-radius: 50%;
            padding: 10px; /* Espacio interno para que no toque los bordes */
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .miso-logo {
            width: 90%; /* Ajuste para que se vea grande y centrado */
            height: 90%;
            object-fit: contain;
        }

        h2 {
            color: #0f172a;
            margin-bottom: 10px;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p {
            color: #334155;
            font-size: 0.95rem;
            margin-bottom: 40px;
            font-weight: 500;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: #1e3a8a; 
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.85); 
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            color: #0f172a;
            font-weight: 500;
        }

        button {
            width: 100%;
            padding: 16px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        button:hover {
            background: #1e40af;
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.3);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-container">
            <img src="https://lh3.googleusercontent.com/u/0/d/1Un44VYQsNWhElbICQwrlvv2CFxRdq8iA" alt="Miso Dataworks" class="miso-logo">
        </div>

        <h2>Portal de Datos</h2>
        <p>Acceso Ejecutivo</p>
        
        <div class="input-group">
            <label>Usuario</label>
            <input type="text" id="user" placeholder="Ej: admin_miso" autocomplete="off">
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="pass" placeholder="••••••••">
        </div>

        <button onclick="login()">Iniciar Sesión</button>
        
        <div id="error" style="color: #dc2626; font-size: 0.85rem; margin-top: 25px; display: none; font-weight: 600;">Credenciales incorrectas.</div>
    </div>

    <script>
        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "admin" && p === "123") {
                window.location.href = "dashboard.html";
            } else {
                document.getElementById('error').style.display = "block";
            }
        }
        document.addEventListener('keypress', (e) => { if (e.key === 'Enter') login(); });
    </script>
</body>
</html>
