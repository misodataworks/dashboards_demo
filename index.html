<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Miso Dataworks</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('3.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        /* AJUSTE DEL LOGO */
        .logo-container {
            background: white;
            width: 80px;
            height: 80px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .logo-img {
            max-width: 65%; /* Escala el logo dentro del círculo blanco */
            height: auto;
        }

        h2 { margin: 0; color: #1e3a8a; font-size: 1.4rem; font-weight: 700; }
        p { color: #475569; font-size: 0.85rem; margin-bottom: 25px; }

        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; font-weight: 700; color: #1e3a8a; margin-bottom: 5px; text-transform: uppercase; }
        
        input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.1);
            background: rgba(255,255,255,0.9);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover { background: #1d4ed8; transform: translateY(-1px); }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-container">
            <img src="MISO Dataworks Vertical.png" alt="Miso Logo" class="logo-img">
        </div>
        <h2>Portal de Datos</h2>
        <p>Acceso Ejecutivo</p>

        <div class="input-group">
            <label>Usuario</label>
            <input type="text" id="username" placeholder="admin">
        </div>
        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button onclick="login()">ACCEDER</button>
    </div>

    <script>
        function login() {
            // Lógica simple para el demo
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
