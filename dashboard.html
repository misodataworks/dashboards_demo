<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Dashboard | Miso Dataworks</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #020818 0%, #001035 30%, #104080 55%, #fcd385 75%, #fb923c 100%);
            background-size: 300% 300%;
            animation: gradientBG 25s ease-in-out infinite;
            overflow-y: auto;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 120px;
            background: linear-gradient(to bottom, rgba(2, 8, 24, 0.8) 0%, rgba(2, 8, 24, 0) 100%);
            z-index: 90;
            pointer-events: none;
        }
        .header-card {
            margin: 20px 25px 10px 25px;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 10px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: sticky;
            top: 20px;
            z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-logo { height: 40px; width: auto; } /* Ajustado para logo vertical */
        h1 { margin: 0; color: #0f172a; font-size: 0.95rem; font-weight: 700; text-transform: uppercase; }
        .btn-logout {
            text-decoration: none;
            color: #1e3a8a;
            font-size: 0.7rem;
            font-weight: 700;
            border: 1.5px solid #1e3a8a;
            padding: 6px 14px;
            border-radius: 8px;
            transition: 0.3s;
        }
        .btn-logout:hover { background: #dc2626; color: white; border-color: #dc2626; }
        .dashboard-grid {
            padding: 20px 25px 40px 25px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            position: relative;
            z-index: 10;
        }
        .section-container {
            background: rgba(255, 255, 255, 0.12);
            padding: 30px;
            border-radius: 35px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 1700px;
            margin: 0 auto;
            width: 100%;
        }
        .section-title {
            color: #ffffff;
            font-size: 1.6rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .report-card {
            background: #ffffff;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            height: 460px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        iframe { width: 1600px; height: 400px; border: none; }
        .ai-insight {
            margin-top: 15px;
            background: rgba(253, 242, 213, 0.95);
            border-radius: 18px;
            padding: 15px 25px;
            border: 1px solid #fbd38d;
        }
        .ai-badge {
            background: #2563eb;
            color: white;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 0.6rem;
            font-weight: 800;
            display: inline-block;
            margin-bottom: 8px;
        }
        .ai-text { font-size: 0.85rem; color: #1e293b; line-height: 1.5; margin: 0; font-weight: 500; }
        
        /* FOOTER POWERED BY PEQUEÑO */
        .footer-minimal {
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
            z-index: 10;
        }
        .powered-tag {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .p-text { font-size: 0.6rem; font-weight: 700; color: #1e3a8a; text-transform: uppercase; }
        .p-logo { height: 20px; width: auto; } /* Logo horizontal pequeño */
    </style>
</head>
<body>
    <header class="header-card">
        <div class="header-left">
            <img src="MISO Dataworks Vertical.png" alt="Miso Logo" class="header-logo">
            <h1>Executive Dashboard</h1>
        </div>
        <a href="index.html" class="btn-logout">Cerrar Sesión</a>
    </header>

    <main class="dashboard-grid">
        <div class="section-container">
            <h2 class="section-title">Últimos 7 días</h2>
            <div class="report-card">
                <iframe src="https://lookerstudio.google.com/embed/reporting/c162cc00-973b-4268-bdc8-2d68a0917700/page/lyfqF"></iframe>
            </div>
            <div class="ai-insight">
                <span class="ai-badge">AI Insight ✨</span>
                <p class="ai-text">Análisis consolidado semanal: Estabilidad operativa detectada con picos de demanda optimizados.</p>
            </div>
        </div>

        <div class="section-container">
            <h2 class="section-title">Tendencia Mensual</h2>
            <div class="report-card">
                <iframe src="https://lookerstudio.google.com/embed/reporting/f350e905-871f-4bfd-8f04-df49969c9148/page/lyfqF"></iframe>
            </div>
            <div class="ai-insight">
                <span class="ai-badge">AI Insight ✨</span>
                <p class="ai-text">Proyección ejecutiva: Crecimiento mensual del 8.5% basado en tendencias actuales.</p>
            </div>
        </div>
    </main>

    <footer class="footer-minimal">
        <div class="powered-tag">
            <span class="p-text">powered by</span>
            <img src="MISO Datworks Horizontal.png" alt="Miso Horizontal" class="p-logo">
        </div>
    </footer>

    <script type="module" defer>
  import Chatbot from "https://cdn.n8nchatui.com/v1/embed.js";
  Chatbot.init({
    "n8nChatUrl": "https://misodataworks.app.n8n.cloud/webhook/a052584a-1637-44cb-9491-a6383ceeedeb/chat",
    "metadata": {}, // Include any custom data to send with each message to your n8n workflow
    "theme": {
      "button": {
        "backgroundColor": "#00eeff",
        "right": 20,
        "bottom": 20,
        "size": 70,
        "iconColor": "#ffffff",
        "customIconSrc": "https://www.svgrepo.com/show/362552/chat-centered-dots-bold.svg",
        "customIconSize": 65,
        "customIconBorderRadius": 32,
        "autoWindowOpen": {
          "autoOpen": true,
          "openDelay": 2
        },
        "borderRadius": "rounded",
        "draggable": false
      },
      "tooltip": {
        "showTooltip": false,
        "tooltipMessage": "Hello 👋 customize & connect me to n8n",
        "tooltipBackgroundColor": "#fff9f6",
        "tooltipTextColor": "#1c1c1c",
        "tooltipFontSize": 15,
        "hideTooltipOnMobile": true
      },
      "allowProgrammaticMessage": false,
      "chatWindow": {
        "borderRadiusStyle": "rounded",
        "avatarBorderRadius": 25,
        "messageBorderRadius": 6,
        "showTitle": true,
        "title": "MISO Dataworks AI",
        "titleAvatarSrc": "https://www.svgrepo.com/show/362552/chat-centered-dots-bold.svg",
        "avatarSize": 40,
        "welcomeMessage": "Hi! I'm your data bot, here to help with any questions about your information!",
        "errorMessage": "Please try again",
        "backgroundColor": "#ffffff",
        "height": 600,
        "width": 400,
        "fontSize": 16,
        "starterPrompts": [
          "Best-selling products, last 3 days?",
          "Best-performing product last month?"
        ],
        "starterPromptFontSize": 15,
        "renderHTML": false,
        "clearChatOnReload": false,
        "showScrollbar": false,
        "botMessage": {
          "backgroundColor": "#f36539",
          "textColor": "#fafafa",
          "showAvatar": true,
          "avatarSrc": "https://www.svgrepo.com/show/334455/bot.svg",
          "showCopyToClipboardIcon": false
        },
        "userMessage": {
          "backgroundColor": "#fff6f3",
          "textColor": "#050505",
          "showAvatar": true,
          "avatarSrc": "https://www.svgrepo.com/show/532363/user-alt-1.svg"
        },
        "textInput": {
          "placeholder": "Type your query",
          "backgroundColor": "#ffffff",
          "textColor": "#1e1e1f",
          "sendButtonColor": "#f36539",
          "maxChars": 50,
          "maxCharsWarningMessage": "You exceeded the characters limit. Please input less than 50 characters.",
          "autoFocus": false,
          "borderRadius": 6,
          "sendButtonBorderRadius": 50
        }
      }
    }
    });
  </script>
</body>
</html>
